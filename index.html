<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper Online </title>
    <link rel="stylesheet" href="styles.css">
</head>
<h1>Minesweeper 💣 </h1>
    <div id="game-layout">
        
        <div class="side-panel">
            <div id="instructions">
                <h3>📖 How to Play</h3>
                <p><strong>Goal:</strong> Reveal all safe squares!</p>
                <ul>
                    <li><strong>Left-Click:</strong> Reveal a square.</li>
                    <li><strong>Right-Click:</strong> Place a flag 🚩.</li>
                    <li><strong>Numbers:</strong> Shows hidden mines nearby.</li>
                </ul>
            </div>
        </div>

        <div class="center-panel">
            <div id="status">Mines left: <span id="mine-count"></span></div>
            <div id="game-board"></div>
        </div>

        <div class="side-panel">
            <button id="restart-btn" onclick="location.reload()">Restart Game</button>
        </div>

    </div>

    <script type="module" src="script.js"></script>
</html>
